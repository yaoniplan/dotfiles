--fullscreen=yes
--speed=2
--mute=yes
--start=7

# Set uosc's autoload option to no (To prevent it from not automatically closing after playback)
script-opts=uosc-autoload=no

[pause_on_focus_lost_video]
profile-cond=not focused and get('current-tracks/video/image') == false
profile-restore=copy
pause=yes
